version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ido
      POSTGRES_USER: ido
      POSTGRES_PASSWORD: ido
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ido"]
      interval: 5s
      timeout: 3s
      retries: 5

  ido:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8645}:8645"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://ido:ido@postgres:5432/ido
      - IDO_MODE=${IDO_MODE:-saas}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8645/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pg_data:
